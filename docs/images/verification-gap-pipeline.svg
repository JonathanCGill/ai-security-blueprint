<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 220" role="img" aria-label="Verification gap pipeline: User input passes through guardrails to LLM to judge to output, but neither guardrails nor judge ask whether the output is actually true">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
    </marker>
    <marker id="arrowDown" markerWidth="6" markerHeight="8" refX="3" refY="7" orient="auto">
      <polygon points="0 0, 3 8, 6 0" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="750" height="220" rx="8" fill="url(#bgGrad)"/>

  <text x="375" y="24" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#1e293b" text-anchor="middle">The Verification Gap</text>

  <!-- Main pipeline -->
  <!-- User Input -->
  <rect x="20" y="55" width="100" height="40" rx="8" fill="#1e293b" filter="url(#shadow)"/>
  <text x="70" y="80" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">User Input</text>
  <line x1="120" y1="75" x2="155" y2="75" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Guardrails -->
  <rect x="160" y="55" width="110" height="40" rx="8" fill="#fff" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="215" y="80" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#1d4ed8" text-anchor="middle">Guardrails</text>
  <line x1="270" y1="75" x2="305" y2="75" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- LLM -->
  <rect x="310" y="55" width="80" height="40" rx="8" fill="#8b5cf6" filter="url(#shadow)"/>
  <text x="350" y="80" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">LLM</text>
  <line x1="390" y1="75" x2="425" y2="75" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Judge -->
  <rect x="430" y="55" width="90" height="40" rx="8" fill="#fff" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <text x="475" y="80" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#d97706" text-anchor="middle">Judge</text>
  <line x1="520" y1="75" x2="555" y2="75" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Output -->
  <rect x="560" y="55" width="90" height="40" rx="8" fill="#10b981" filter="url(#shadow)"/>
  <text x="605" y="80" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">Output</text>

  <!-- Down arrows and questions -->
  <!-- Guardrails question -->
  <line x1="215" y1="95" x2="215" y2="120" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="155" y="122" width="120" height="30" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="215" y="139" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#64748b" text-anchor="middle">"Does this match</text>
  <text x="215" y="149" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#64748b" text-anchor="middle">bad patterns?"</text>

  <!-- Judge question -->
  <line x1="475" y1="95" x2="475" y2="120" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="415" y="122" width="120" height="30" rx="6" fill="#fefce8" stroke="#fde68a" stroke-width="1"/>
  <text x="475" y="139" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#64748b" text-anchor="middle">"Is this response</text>
  <text x="475" y="149" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#64748b" text-anchor="middle">appropriate?"</text>

  <!-- The gap -->
  <rect x="200" y="170" width="350" height="35" rx="8" fill="#fee2e2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="375" y="192" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#991b1b" text-anchor="middle">Neither asks: "Is this actually true?"</text>
</svg>