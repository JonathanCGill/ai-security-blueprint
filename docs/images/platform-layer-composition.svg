<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 520" role="img" aria-label="How platform layers compose: Business Problem flows through Use Case Filter, Platform and Patterns, Use Case Definition, Risk Classification, Control Design, Build, and Operations">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="700" height="520" rx="8" fill="url(#bgGrad)"/>

  <text x="350" y="28" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e293b" text-anchor="middle">How the Layers Compose</text>

  <!-- Step boxes with arrows -->
  <!-- Business Problem -->
  <rect x="60" y="50" width="240" height="38" rx="8" fill="#1e293b" filter="url(#shadow)"/>
  <text x="180" y="74" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">BUSINESS PROBLEM</text>
  <line x1="180" y1="88" x2="180" y2="104" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Use Case Filter -->
  <rect x="60" y="110" width="240" height="38" rx="8" fill="#3b82f6" filter="url(#shadow)"/>
  <text x="180" y="134" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">USE CASE FILTER</text>
  <text x="380" y="134" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="start">What kind of solution?</text>
  <line x1="180" y1="148" x2="180" y2="164" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Platform and Patterns -->
  <rect x="60" y="170" width="240" height="38" rx="8" fill="#8b5cf6" filter="url(#shadow)"/>
  <text x="180" y="194" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">PLATFORM AND PATTERNS</text>
  <text x="380" y="186" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="start">How does it run?</text>
  <!-- Sub-items -->
  <text x="395" y="200" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#94a3b8" text-anchor="start">Approved platform · Trusted models</text>
  <text x="395" y="212" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#94a3b8" text-anchor="start">Proven pattern · Data connectors</text>
  <line x1="180" y1="208" x2="180" y2="224" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Use Case Definition -->
  <rect x="60" y="230" width="240" height="38" rx="8" fill="#0ea5e9" filter="url(#shadow)"/>
  <text x="180" y="254" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">USE CASE DEFINITION</text>
  <text x="380" y="254" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="start">What exactly does the AI do?</text>
  <line x1="180" y1="268" x2="180" y2="284" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Risk Classification -->
  <rect x="60" y="290" width="240" height="38" rx="8" fill="#f59e0b" filter="url(#shadow)"/>
  <text x="180" y="314" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">RISK CLASSIFICATION</text>
  <text x="380" y="314" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="start">What tier?</text>
  <line x1="180" y1="328" x2="180" y2="344" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Control Design -->
  <rect x="60" y="350" width="240" height="38" rx="8" fill="#ef4444" filter="url(#shadow)"/>
  <text x="180" y="374" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">CONTROL DESIGN</text>
  <text x="380" y="374" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="start">Standard controls + pattern-specific tuning</text>
  <line x1="180" y1="388" x2="180" y2="404" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Build -->
  <rect x="60" y="410" width="240" height="38" rx="8" fill="#10b981" filter="url(#shadow)"/>
  <text x="180" y="434" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">BUILD</text>
  <text x="380" y="434" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="start">Assemble from approved components</text>
  <line x1="180" y1="448" x2="180" y2="464" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Operations -->
  <rect x="60" y="470" width="240" height="38" rx="8" fill="#6366f1" filter="url(#shadow)"/>
  <text x="180" y="494" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">OPERATIONS</text>
  <text x="380" y="494" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="start">Familiar logs, known patterns, standard playbooks</text>
</svg>