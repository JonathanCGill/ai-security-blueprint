<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 680" font-family="'Roboto Mono', 'Courier New', monospace">
  <defs>
    <style>
      .bg { fill: #0d1117; }
      .border { fill: none; stroke: #30363d; stroke-width: 2; }
      .title { fill: #58a6ff; font-size: 14px; font-weight: 700; text-anchor: middle; }
      .subtitle { fill: #8b949e; font-size: 11px; text-anchor: middle; }
      .box { fill: none; stroke: #30363d; stroke-width: 1.5; rx: 3; }
      .box-io { fill: #161b22; stroke: #58a6ff; stroke-width: 1.5; rx: 3; }
      .box-layer { fill: #161b22; stroke: #3fb950; stroke-width: 1.5; rx: 3; }
      .box-llm { fill: #161b22; stroke: #d29922; stroke-width: 1.5; rx: 3; }
      .box-judge { fill: #161b22; stroke: #bc8cff; stroke-width: 1.5; rx: 3; }
      .box-human { fill: #161b22; stroke: #58a6ff; stroke-width: 1.5; rx: 3; }
      .box-breaker { fill: #161b22; stroke: #f85149; stroke-width: 1.5; rx: 3; }
      .label-io { fill: #58a6ff; font-size: 12px; font-weight: 700; text-anchor: middle; }
      .label-layer { fill: #3fb950; font-size: 11.5px; font-weight: 700; text-anchor: middle; }
      .label-llm { fill: #d29922; font-size: 11.5px; font-weight: 700; text-anchor: middle; }
      .label-judge { fill: #bc8cff; font-size: 11.5px; font-weight: 700; text-anchor: middle; }
      .label-human { fill: #58a6ff; font-size: 11.5px; font-weight: 700; text-anchor: middle; }
      .label-breaker { fill: #f85149; font-size: 11.5px; font-weight: 700; text-anchor: middle; }
      .tag { fill: #8b949e; font-size: 10px; }
      .tag-fast { fill: #3fb950; font-size: 10px; }
      .tag-prob { fill: #bc8cff; font-size: 10px; }
      .tag-exc { fill: #58a6ff; font-size: 10px; }
      .tag-def { fill: #f85149; font-size: 10px; }
      .detail { fill: #8b949e; font-size: 10px; text-anchor: middle; }
      .arrow { stroke: #484f58; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
      .pipe { stroke: #30363d; stroke-width: 1; stroke-dasharray: 2,3; }
    </style>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#484f58" stroke-width="1.2"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect class="bg" width="720" height="680" rx="8"/>
  <rect class="border" x="16" y="16" width="688" height="648" rx="6"/>

  <!-- Title block -->
  <text class="title" x="360" y="50">AI RUNTIME SECURITY (AIRS)</text>
  <text class="subtitle" x="360" y="68">RUNTIME CONTROL PLANE v2.2</text>

  <!-- Input box -->
  <rect class="box-io" x="120" y="90" width="480" height="36"/>
  <text class="label-io" x="360" y="113">USER / SYSTEM INPUT</text>

  <!-- Arrow -->
  <line class="arrow" x1="360" y1="126" x2="360" y2="152"/>

  <!-- Layer 1: Guardrails -->
  <rect class="box-layer" x="80" y="155" width="400" height="36"/>
  <text class="label-layer" x="280" y="178">LAYER 1: GUARDRAILS</text>
  <text class="tag-fast" x="500" y="178">&lt;-- FAST, DETERMINISTIC</text>

  <!-- Detail -->
  <text class="detail" x="280" y="206">Content / Intent / PII</text>

  <!-- Arrow -->
  <line class="arrow" x1="360" y1="212" x2="360" y2="238"/>

  <!-- Primary LLM -->
  <rect class="box-llm" x="100" y="241" width="520" height="36"/>
  <text class="label-llm" x="360" y="264">PRIMARY LLM / AGENT CHAIN</text>

  <!-- Detail -->
  <text class="detail" x="360" y="292">Raw Output</text>

  <!-- Arrow -->
  <line class="arrow" x1="360" y1="298" x2="360" y2="324"/>

  <!-- Layer 2: Model-as-Judge -->
  <rect class="box-judge" x="80" y="327" width="400" height="36"/>
  <text class="label-judge" x="280" y="350">LAYER 2: MODEL-as-JUDGE</text>
  <text class="tag-prob" x="500" y="350">&lt;-- PROBABILISTIC</text>

  <!-- Detail -->
  <text class="detail" x="280" y="378">Scope / Hallucination / Drift</text>

  <!-- Arrow -->
  <line class="arrow" x1="360" y1="384" x2="360" y2="410"/>

  <!-- Layer 3: Human-in-the-Loop -->
  <rect class="box-human" x="80" y="413" width="400" height="36"/>
  <text class="label-human" x="280" y="436">LAYER 3: HUMAN-in-THE-LOOP</text>
  <text class="tag-exc" x="500" y="436">&lt;-- EXCEPTION-ONLY</text>

  <!-- Detail -->
  <text class="detail" x="280" y="464">Critical Decisions / Audits</text>

  <!-- Arrow -->
  <line class="arrow" x1="360" y1="470" x2="360" y2="496"/>

  <!-- Layer 4: Circuit Breaker -->
  <rect class="box-breaker" x="80" y="499" width="400" height="36"/>
  <text class="label-breaker" x="280" y="522">LAYER 4: CIRCUIT BREAKER</text>
  <text class="tag-def" x="500" y="522">&lt;-- ACTIVE DEFENSE</text>

  <!-- Detail -->
  <text class="detail" x="280" y="550">Kill Switch / Safe Fallback</text>

  <!-- Arrow -->
  <line class="arrow" x1="360" y1="556" x2="360" y2="582"/>

  <!-- Output box -->
  <rect class="box-io" x="120" y="585" width="480" height="36"/>
  <text class="label-io" x="360" y="608">VERIFIED, SAFE OUTPUT</text>

  <!-- Decorative corner markers -->
  <text fill="#30363d" font-size="14" x="24" y="32" font-family="'Roboto Mono', monospace">+</text>
  <text fill="#30363d" font-size="14" x="696" y="32" font-family="'Roboto Mono', monospace">+</text>
  <text fill="#30363d" font-size="14" x="24" y="660" font-family="'Roboto Mono', monospace">+</text>
  <text fill="#30363d" font-size="14" x="696" y="660" font-family="'Roboto Mono', monospace">+</text>

  <!-- Scan lines for terminal feel -->
  <line class="pipe" x1="30" y1="80" x2="690" y2="80"/>
  <line class="pipe" x1="30" y1="636" x2="690" y2="636"/>

  <!-- Version badge -->
  <text fill="#484f58" font-size="9" x="620" y="654" font-family="'Roboto Mono', monospace">AIRS v2.2</text>
</svg>
